name: Verify Agents

on:
  pull_request:
    branches: [ main, foundation ]
  push:
    branches: [ main, foundation ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: json, mbstring
        tools: composer

    - name: Run Structural Verification
      run: make verify
